{# film_strip template: 35mm film frame with sprocket holes and Kodak-style markings #}
{% set pad = props.border_padding | default(0.02) %}
{% set img_w = layout.image_width %}
{% set img_h = layout.image_height %}
{% set pad_x = (img_w * pad) | int %}
{% set pad_y = (img_h * pad) | int %}

{# Film strip geometry #}
{% set strip_w = 120 %}
{% set canvas_w = strip_w + pad_x + img_w + pad_x + strip_w %}
{% set top_margin = 80 %}
{% set bottom_margin = 80 %}
{% set canvas_h = top_margin + pad_y + img_h + pad_y + bottom_margin %}

{# Colors #}
{% set base_color = props.film_base_color | default('#1A1A1A') %}
{% set sprocket_color = props.sprocket_color | default('#111111') %}
{% set text_color = props.text_color | default('#FF8C00') %}
{% set frame_num = props.frame_number | default(24) %}
{% set film_label = props.film_stock_label | default('KODAK 400TX') %}

{# Sprocket hole dimensions #}
{% set hole_w = 42 %}
{% set hole_h = 64 %}
{% set hole_r = 8 %}
{% set hole_gap = 30 %}
{% set hole_step = hole_h + hole_gap %}
{% set hole_count = ((canvas_h - 40) / hole_step) | int %}

{# Font sizes #}
{% set label_size = 32 %}
{% set frame_num_size = 48 %}
{% set exif_size = 26 %}

<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="{{ canvas_w }}" height="{{ canvas_h }}"
     viewBox="0 0 {{ canvas_w }} {{ canvas_h }}">

    {# Transparent base — compositor creates the dark bg #}
    <rect width="100%" height="100%" fill="transparent" />

    {# ── Left film strip ── #}
    <g id="left-strip">
        {# Sprocket holes #}
        {% for i in range(hole_count) %}
        {% set hy = 20 + i * hole_step %}
        <rect x="{{ (strip_w - hole_w) / 2 | int }}"
              y="{{ hy }}"
              width="{{ hole_w }}" height="{{ hole_h }}"
              rx="{{ hole_r }}" ry="{{ hole_r }}"
              fill="{{ sprocket_color }}" />
        {% endfor %}

        {# Thin guide lines along strip edges #}
        <line x1="8" y1="0" x2="8" y2="{{ canvas_h }}"
              stroke="{{ text_color }}" stroke-width="1" opacity="0.25" />
        <line x1="{{ strip_w - 8 }}" y1="0" x2="{{ strip_w - 8 }}" y2="{{ canvas_h }}"
              stroke="{{ text_color }}" stroke-width="1" opacity="0.25" />
    </g>

    {# ── Right film strip ── #}
    <g id="right-strip">
        {# Sprocket holes #}
        {% for i in range(hole_count) %}
        {% set hy = 20 + i * hole_step %}
        <rect x="{{ canvas_w - strip_w + (strip_w - hole_w) / 2 | int }}"
              y="{{ hy }}"
              width="{{ hole_w }}" height="{{ hole_h }}"
              rx="{{ hole_r }}" ry="{{ hole_r }}"
              fill="{{ sprocket_color }}" />
        {% endfor %}

        {# Thin guide lines #}
        <line x1="{{ canvas_w - strip_w + 8 }}" y1="0"
              x2="{{ canvas_w - strip_w + 8 }}" y2="{{ canvas_h }}"
              stroke="{{ text_color }}" stroke-width="1" opacity="0.25" />
        <line x1="{{ canvas_w - 8 }}" y1="0"
              x2="{{ canvas_w - 8 }}" y2="{{ canvas_h }}"
              stroke="{{ text_color }}" stroke-width="1" opacity="0.25" />
    </g>

    {# ── Top margin: film stock label + frame number ── #}
    <g id="top-markings">
        {# Film stock label (left side) #}
        <text x="{{ strip_w + pad_x }}"
              y="{{ top_margin * 0.62 | int }}"
              font-family="'Courier New', Courier, monospace"
              font-size="{{ label_size }}" font-weight="bold"
              fill="{{ text_color }}" opacity="0.85">{{ film_label }}</text>

        {# Frame number triangle marker + number #}
        {% set fn_x = canvas_w - strip_w - pad_x %}
        <polygon points="{{ fn_x - frame_num_size * 0.4 | int }},{{ top_margin * 0.25 | int }} {{ fn_x }},{{ top_margin * 0.25 | int }} {{ fn_x - frame_num_size * 0.2 | int }},{{ top_margin * 0.05 | int }}"
                 fill="{{ text_color }}" opacity="0.7" />
        <text x="{{ fn_x }}"
              y="{{ top_margin * 0.65 | int }}"
              font-family="'Courier New', Courier, monospace"
              font-size="{{ frame_num_size }}" font-weight="bold"
              fill="{{ text_color }}" opacity="0.9"
              text-anchor="end">{{ frame_num }}A</text>
    </g>

    {# ── Image window border lines ── #}
    {% set win_x = strip_w %}
    {% set win_y = top_margin %}
    {% set win_w = pad_x + img_w + pad_x %}
    {% set win_h = pad_y + img_h + pad_y %}

    {# Thin frame lines around the image area #}
    <rect x="{{ win_x }}" y="{{ win_y }}"
          width="{{ win_w }}" height="{{ win_h }}"
          fill="none" stroke="{{ text_color }}" stroke-width="1.5" opacity="0.3" />

    {# ── Bottom margin: EXIF info + edge codes ── #}
    <g id="bottom-markings">
        {% set bot_y = top_margin + win_h %}

        {# Kodak-style color band #}
        {% if props.show_color_band | default(true) %}
        {% set band_y = bot_y + 16 %}
        {% set band_h = 12 %}
        {% set band_w = 60 %}
        {% set band_x = strip_w + pad_x %}
        <rect x="{{ band_x }}" y="{{ band_y }}"
              width="{{ band_w }}" height="{{ band_h }}" fill="#FF4500" />
        <rect x="{{ band_x + band_w }}" y="{{ band_y }}"
              width="{{ band_w }}" height="{{ band_h }}" fill="#FFD700" />
        <rect x="{{ band_x + band_w * 2 }}" y="{{ band_y }}"
              width="{{ band_w }}" height="{{ band_h }}" fill="#32CD32" />
        <rect x="{{ band_x + band_w * 3 }}" y="{{ band_y }}"
              width="{{ band_w }}" height="{{ band_h }}" fill="#1E90FF" />
        <rect x="{{ band_x + band_w * 4 }}" y="{{ band_y }}"
              width="{{ band_w }}" height="{{ band_h }}" fill="#FF4500" />
        <rect x="{{ band_x + band_w * 5 }}" y="{{ band_y }}"
              width="{{ band_w }}" height="{{ band_h }}" fill="#FFD700" />
        {% endif %}

        {# EXIF info line #}
        {% if props.show_exif | default(true) %}
        {% set exif_y = bot_y + 55 %}

        {% set params = [] %}
        {% if exif.focal_length %}{% set _ = params.append(exif.focal_length) %}{% endif %}
        {% if exif.aperture %}{% set _ = params.append(exif.aperture) %}{% endif %}
        {% if exif.exposure_time %}{% set _ = params.append(exif.exposure_time) %}{% endif %}
        {% if exif.iso %}{% set _ = params.append(exif.iso) %}{% endif %}

        <text x="{{ strip_w + pad_x }}"
              y="{{ exif_y }}"
              font-family="'Courier New', Courier, monospace"
              font-size="{{ exif_size }}"
              fill="{{ text_color }}" opacity="0.7">{{ exif.make }} {{ exif.model }}  {{ params | join('  ') }}</text>
        {% endif %}

        {# DX edge barcode simulation (right side) #}
        {% set dx_x = canvas_w - strip_w - pad_x - 200 %}
        {% set dx_y = bot_y + 12 %}
        {% for i in range(12) %}
        {% set bw = 6 if (i % 3 != 1) else 12 %}
        <rect x="{{ dx_x + i * 16 }}" y="{{ dx_y }}"
              width="{{ bw }}" height="30"
              fill="{{ text_color }}" opacity="{{ 0.5 if (i % 2 == 0) else 0.3 }}" />
        {% endfor %}
    </g>
</svg>
